<!-- LOGIN -->
<div id="login" style="
height:100vh;
background:linear-gradient(180deg,#108ee9,#36cfc9);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
">

  <!-- LOGO / NAMA -->
  <h1 style="font-size:28px; margin-bottom:30px;">DANA</h1>

  <!-- CARD LOGIN -->
  <div style="
  background:white;
  width:85%;
  max-width:320px;
  padding:20px;
  border-radius:20px;
  color:black;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  ">

    <h3 style="margin-bottom:10px;">Masuk</h3>

    <input id="user" placeholder="Nomor 12 digit" maxlength="12"
    style="width:100%; padding:12px; margin-top:10px; border-radius:10px; border:1px solid #ddd;">

    <input id="pass" type="password" placeholder="PIN 6 digit" maxlength="6"
    style="width:100%; padding:12px; margin-top:10px; border-radius:10px; border:1px solid #ddd;">

    <button onclick="login()"
    style="width:100%; margin-top:15px; padding:12px; border:none; border-radius:10px; background:#108ee9; color:white; font-weight:bold;">
      Login
    </button>

    <p id="error" style="color:red; font-size:12px;"></p>
  </div>

  <!-- FOOTER -->
  <p style="margin-top:20px; font-size:12px; opacity:0.8;">
    Demo UI Wallet
  </p>

</div>
