<!DOCTYPE html>
<html>
<head>
  <title>Login Demo Wallet</title>
</head>
<body style="font-family:sans-serif; background:#f5f5f5; text-align:center;">

  <div style="background:#108ee9; padding:20px; color:white;">
    <h2>Demo Wallet</h2>
  </div>

  <div style="margin-top:50px;">
    <h3>Masuk</h3>

    <input type="text" id="user" placeholder="Nomor HP"
    style="padding:10px; width:200px;"><br><br>

    <input type="password" id="pass" placeholder="PIN"
    style="padding:10px; width:200px;"><br><br>

    <button onclick="login()" 
    style="padding:10px 20px; background:#108ee9; color:white; border:none;">
      Login
    </button>

    <p id="hasil"></p>
  </div>

  <script>
    function login() {
      let u = document.getElementById("user").value;
      let p = document.getElementById("pass").value;

      if (u === "08123456789" && p === "1234") {
        window.location.href = "home.html";
      } else {
        document.getElementById("hasil").innerHTML = "Nomor atau PIN salah";
      }
    }
  </script>

</body>
</html>
